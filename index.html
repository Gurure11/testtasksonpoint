<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OnpointBase · Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root { --bg: #F1F4F7; --card: #FFFFFF; --line: #E6EAEF; --ink: #171F2B; --ink2: #5A6473; --ink3: #8A93A1; --brand: #00A8F0; --brand-ink: #0B79B0; --brand-soft: #E6F6FE; --late: #D14343; --late-soft: #FBEBEB; --ontime: #1E9E6A; --sans: 'IBM Plex Sans', system-ui, sans-serif; --mono: 'IBM Plex Mono', ui-monospace, monospace; }
* { box-sizing: border-box; margin:0; padding:0; }
body { font-family: var(--sans); background: var(--bg); color: var(--ink); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
.login-wrap { max-width: 420px; width:100%; background: var(--card); border-radius: 16px; border:1px solid var(--line); padding: 32px 28px 28px; box-shadow: 0 12px 40px rgba(15,22,34,.08); }
.brand { display: flex; align-items: center; gap: 12px; margin-bottom: 22px; }
.brand img { width: 40px; height: 40px; object-fit: contain; }
.brand .t { font-weight: 700; font-size: 18px; letter-spacing: -.01em; color: var(--ink); }
.brand .t span { color: var(--ink3); font-weight: 500; }
h1 { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
.sub { font-size: 13px; color: var(--ink2); margin-bottom: 22px; }
label { display: block; font-size: 12px; font-weight: 500; color: var(--ink2); margin-bottom: 4px; }
input { width:100%; padding: 10px 12px; border: 1px solid var(--line); border-radius: 8px; font: inherit; font-size:14px; color: var(--ink); background: #fff; margin-bottom: 14px; transition: border-color .15s; }
input:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-soft); }
.btn { width:100%; background: var(--brand); border: none; border-radius: 8px; padding: 11px; font: inherit; font-weight: 600; font-size: 15px; color: #fff; cursor: pointer; transition: background .15s; }
.btn:hover { background: var(--brand-ink); }
.error { color: var(--late); font-size: 13px; margin-top: 10px; min-height: 20px; text-align: center; }
.footer { font-family: var(--mono); font-size: 10px; color: var(--ink3); margin-top: 20px; text-align: center; border-top: 1px solid var(--line); padding-top: 14px; }
.conn { font-family: var(--mono); font-size: 10px; letter-spacing: .05em; text-transform: uppercase; border: 1px solid var(--line); border-radius: 999px; padding: 4px 10px; color: var(--ink3); background: #fff; display: inline-flex; align-items: center; gap: 6px; margin-bottom: 14px; }
.conn::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: var(--ink3); display: inline-block; }
.conn.connected::before { background: var(--ontime); }
.conn.error::before { background: var(--late); }
.conn.connecting::before { background: var(--ink3); }
.hidden { display: none; }
.loading { opacity: 0.6; pointer-events: none; }
</style>
</head>

    // Try Apps Script JSONP first
    const data = await jsonp(WRITE_URL, { mode: 'readAll', spreadsheetId: SHEET_ID });
    if (data && data.ok && data.sheets && data.sheets[ SHEET_NAME ]) {
      users = data.sheets[ SHEET_NAME ];
      status.className = 'conn connected';
      status.textContent = 'Connected · ' + users.length + ' users';
      return users;
    }
    throw new Error('No users sheet found.');
  } catch (err) {
    console.warn('Apps Script read failed, falling back to gviz...', err);
    try {
      const rows = await gsheetFetch(SHEET_NAME);
      users = rows;
      status.className = 'conn connected';
      status.textContent = 'Connected · ' + users.length + ' users';
      return users;
    } catch (e2) {
      status.className = 'conn error';
      status.textContent = 'Could not load users';
      console.error('Failed to fetch users:', e2);
      return [];
    }
  }
}

function jsonp(url, params) {
  return new Promise((resolve, reject) => {
    const cb = 'opot_login_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const s = document.createElement('script');
    const u = new URL(url);
    Object.keys(params || {}).forEach(k => u.searchParams.set(k, params[k]));
    u.searchParams.set('callback', cb);
    u.searchParams.set('_', Date.now());
    const timer = setTimeout(() => { cleanup(); reject(new Error('Apps Script timed out')); }, 15000);
    function cleanup() {
      clearTimeout(timer);
      try { delete window[cb]; } catch (e) { window[cb] = undefined; }
      if (s.parentNode) s.parentNode.removeChild(s);
    }
    window[cb] = (data) => {
      cleanup();
      data && data.ok ? resolve(data) : reject(new Error((data && data.error) || 'Apps Script error'));
    };
    s.onerror = () => { cleanup(); reject(new Error('Network error')); };
    s.src = u.toString();
    document.head.appendChild(s);
  });
}

async function gsheetFetch(tab) {
  const url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:json&sheet=' + encodeURIComponent(tab) + '&t=' + Date.now();
  const res = await fetch(url, { cache: 'no-store' });
  if (!res.ok) throw new Error('Sheet fetch failed: ' + res.status);
  const txt = await res.text();
  const json = JSON.parse(txt.substring(txt.indexOf('{'), txt.lastIndexOf('}') + 1));
  const cols = (json.table.cols || []).map((c, i) => c.label || c.id || ('Column ' + (i + 1)));
  return (json.table.rows || []).map(r => {
    const o = {};
    (r.c || []).forEach((c, i) => o[cols[i]] = c ? ((c.f && /^Date\(/.test(String(c.v))) ? c.f : c.v) : '');
    return o;
  }).filter(o => Object.values(o).some(v => String(v || '').trim() !== ''));
}

function normalizeEmail(email) {
  return String(email || '').trim().toLowerCase();
}

function handleLogin(e) {
  e.preventDefault();
  if (loginAttempt) return;
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value.trim();
  const errorEl = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');

  if (!email || !password) {
    errorEl.textContent = 'Please enter both email and password.';
    return;
  }

  if (users.length === 0) {
    errorEl.textContent = 'User data not loaded yet. Please wait or refresh.';
    return;
  }

  const normalizedEmail = normalizeEmail(email);
  const user = users.find(u => normalizeEmail(u['Email']) === normalizedEmail && String(u['Password'] || '').trim() === password);

  if (!user) {
    errorEl.textContent = 'Invalid email or password.';
    return;
  }

  loginAttempt = true;
  btn.textContent = 'Logging in...';
  btn.disabled = true;

  // Build user session
  const session = {
    userId: user['User ID'] || user['ID'] || '',
    fullName: user['Full Name'] || user['Name'] || '',
    email: user['Email'] || '',
    department: user['Department'] || '',
    role: user['Role'] || 'User',
    status: user['Status'] || 'Active',
    joinDate: user['Join Date'] || '',
    userRights: user['User Rights'] || '',
    whatsapp: user['Whatsapp No.'] || '',
    costCenter: user['CostCenter'] || ''
  };

  // Save session in localStorage
  localStorage.setItem('onpointSession', JSON.stringify(session));

  // Redirect to dashboard
  window.location.href = 'OnpointBase-MIS-Approver-Dashboard-LIVE-GoogleSheet.html';
  return false;
}

// On load: fetch users and check existing session
window.addEventListener('DOMContentLoaded', async () => {
  await fetchUsers();

  // Check if already logged in
  const session = localStorage.getItem('onpointSession');
  if (session) {
    try {
      const s = JSON.parse(session);
      if (s.email) {
        // Redirect if session exists (but allow manual logout by clearing storage)
        // We'll let the dashboard handle session validation.
        // But if they're on login page, just redirect.
        window.location.href = 'OnpointBase-MIS-Approver-Dashboard-LIVE-GoogleSheet.html';
        return;
      }
    } catch (e) {}
  }

  document.getElementById('loginBtn').disabled = false;
  document.getElementById('loginBtn').textContent = 'Log in';
  loginAttempt = false;
});
