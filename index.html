<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>OnPoint SHEQ · Secure Login & Registration</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: linear-gradient(145deg, #eef2f9 0%, #d9e0ec 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    /* main glassmorphic card container */
    .sheq-auth-container {
      max-width: 1300px;
      width: 100%;
      margin: 0 auto;
    }

    .auth-card {
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(2px);
      border-radius: 2rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(0, 119, 182, 0.08);
      overflow: hidden;
      transition: all 0.2s ease;
    }

    .brand-header {
      background: #0b1f3a;
      padding: 1.2rem 2rem;
      color: white;
      display: flex;
      align-items: center;
      gap: 0.85rem;
      flex-wrap: wrap;
      justify-content: space-between;
    }

    .brand-logo {
      display: flex;
      align-items: center;
      gap: 0.85rem;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #00b4d8, #0077b6);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1.6rem;
      box-shadow: 0 10px 20px -5px rgba(0,180,216,0.3);
    }

    .brand-header h2 {
      font-weight: 700;
      margin: 0;
      font-size: 1.5rem;
      letter-spacing: -0.3px;
    }

    .brand-header p {
      margin: 0;
      opacity: 0.8;
      font-size: 0.85rem;
    }

    .status-badge {
      background: rgba(255,255,255,0.15);
      padding: 0.4rem 1rem;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .tab-buttons {
      display: flex;
      border-bottom: 2px solid #e9edf2;
      background: #ffffff;
      padding: 0 1.8rem;
      gap: 1.5rem;
    }

    .tab-btn {
      background: none;
      border: none;
      padding: 1rem 0.5rem;
      font-weight: 700;
      font-size: 1rem;
      color: #5b6e8c;
      transition: all 0.2s;
      cursor: pointer;
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .tab-btn i {
      font-size: 1.1rem;
    }

    .tab-btn.active {
      color: #0077b6;
    }

    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 100%;
      height: 3px;
      background: #0077b6;
      border-radius: 3px;
    }

    .tab-pane {
      display: none;
      animation: fadeSlide 0.25s ease-out;
      padding: 2rem 2rem 2.2rem 2rem;
    }

    .tab-pane.active-pane {
      display: block;
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .form-label {
      font-weight: 600;
      color: #1e2f44;
      margin-bottom: 0.5rem;
      font-size: 0.85rem;
    }

    .input-group-custom {
      border-radius: 1rem;
      border: 1px solid #cfdfed;
      transition: 0.15s;
      background: #fff;
    }

    .input-group-custom:focus-within {
      border-color: #0077b6;
      box-shadow: 0 0 0 3px rgba(0,119,182,0.2);
    }

    .form-control, .form-select {
      border: none;
      background: transparent;
      padding: 0.75rem 1rem;
      font-size: 0.95rem;
      border-radius: 1rem;
    }

    .form-control:focus, .form-select:focus {
      box-shadow: none;
      background: transparent;
    }

    .btn-sheq {
      background: #0b1f3a;
      border: none;
      padding: 0.8rem 1.2rem;
      font-weight: 700;
      border-radius: 1.2rem;
      transition: all 0.2s;
      color: white;
      width: 100%;
    }

    .btn-sheq:hover {
      background: #0077b6;
      transform: translateY(-2px);
      box-shadow: 0 12px 20px -8px rgba(0,119,182,0.4);
    }

    .btn-outline-sheq {
      background: white;
      border: 1.5px solid #0b1f3a;
      color: #0b1f3a;
      font-weight: 700;
      border-radius: 1.2rem;
      padding: 0.7rem 1.2rem;
    }

    .btn-outline-sheq:hover {
      background: #f0f4fa;
      border-color: #0077b6;
    }

    .message-box {
      border-radius: 1.2rem;
      font-size: 0.85rem;
      padding: 0.8rem 1rem;
      margin-top: 1.2rem;
    }

    .success-message {
      background: #e1f7e9;
      color: #1e7b48;
      border-left: 4px solid #2a9d8f;
    }

    .error-message {
      background: #ffe9e9;
      color: #b91c1c;
      border-left: 4px solid #d62828;
    }

    .info-message {
      background: #e8f0fe;
      color: #0b5e7e;
    }

    .footer-note {
      text-align: center;
      margin-top: 1.8rem;
      font-size: 0.75rem;
      color: #64748b;
    }

    hr {
      background: #e2e8f0;
    }

    @media (max-width: 640px) {
      .tab-pane {
        padding: 1.5rem;
      }
      .brand-header {
        flex-direction: column;
        text-align: center;
      }
      .tab-buttons {
        justify-content: center;
        gap: 1rem;
      }
    }
  </style>
</head>
<body>
<div class="sheq-auth-container">
  <div class="auth-card">
    <div class="brand-header">
      <div class="brand-logo">
        <div class="logo-icon">OP</div>
        <div>
          <h2>OnPoint Group · SHEQ</h2>
          <p>Safety, Health, Environment & Quality platform</p>
        </div>
      </div>
      <div class="status-badge" id="liveStatusBadge">
        <i class="fas fa-circle" style="font-size: 0.7rem; color: #f4a261;"></i> 
        <span id="statusText">Connecting...</span>
      </div>
    </div>

    <div class="tab-buttons">
      <button class="tab-btn active" id="loginTabBtn"><i class="fas fa-sign-in-alt"></i> Login</button>
      <button class="tab-btn" id="registerTabBtn"><i class="fas fa-user-plus"></i> Register new user</button>
    </div>

    <!-- LOGIN PANEL -->
    <div id="loginPane" class="tab-pane active-pane">
      <form id="secureLoginForm">
        <div class="row g-4">
          <div class="col-12">
            <label class="form-label"><i class="fas fa-envelope me-1"></i> Email address</label>
            <div class="input-group-custom d-flex align-items-center">
              <span class="ps-3 text-secondary"><i class="fas fa-envelope"></i></span>
              <input type="email" name="email" class="form-control" placeholder="john.doe@onpointgroup.com" required autocomplete="email">
            </div>
          </div>
          <div class="col-12">
            <label class="form-label"><i class="fas fa-lock me-1"></i> Password</label>
            <div class="input-group-custom d-flex align-items-center">
              <span class="ps-3 text-secondary"><i class="fas fa-key"></i></span>
              <input type="password" name="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
            </div>
          </div>
          <div class="col-12">
            <button type="submit" class="btn btn-sheq" id="loginBtnSubmit">
              <i class="fas fa-arrow-right-to-bracket me-2"></i> Sign in to Dashboard
            </button>
          </div>
          <div id="loginFeedback" class="message-box" style="display: none;"></div>
          <div class="footer-note">
            <i class="fas fa-database me-1"></i> Credentials verified against Google Sheet <strong>"Login"</strong> tab · Role-based access
          </div>
        </div>
      </form>
    </div>

    <!-- REGISTRATION PANEL -->
    <div id="registerPane" class="tab-pane">
      <form id="secureRegisterForm">
        <div class="row g-4">
          <div class="col-md-6">
            <label class="form-label"><i class="fas fa-user-circle"></i> Full name</label>
            <div class="input-group-custom">
              <input type="text" name="fullName" class="form-control" placeholder="Michael O'Neill" required>
            </div>
          </div>
          <div class="col-md-6">
            <label class="form-label"><i class="fas fa-envelope"></i> Email (will be unique)</label>
            <div class="input-group-custom">
              <input type="email" name="email" class="form-control" placeholder="michael@onpoint.com" required>
            </div>
          </div>
          <div class="col-md-6">
            <label class="form-label"><i class="fas fa-lock"></i> Password</label>
            <div class="input-group-custom">
              <input type="password" name="password" class="form-control" placeholder="Create a strong password" required>
            </div>
          </div>
          <div class="col-md-6">
            <label class="form-label"><i class="fas fa-briefcase"></i> Role</label>
            <div class="input-group-custom">
              <select name="role" class="form-select">
                <option>User</option><option>Supervisor</option><option>Manager</option><option>Admin</option>
              </select>
            </div>
          </div>
          <div class="col-md-6">
            <label class="form-label"><i class="fas fa-building"></i> Department</label>
            <div class="input-group-custom">
              <input type="text" name="department" class="form-control" placeholder="HSE, Operations, Quality">
            </div>
          </div>
          <div class="col-md-6">
            <label class="form-label"><i class="fas fa-flag-checkered"></i> Status</label>
            <div class="input-group-custom">
              <select name="status" class="form-select">
                <option>Active</option><option>Inactive</option>
              </select>
            </div>
          </div>
          <div class="col-12">
            <button type="submit" class="btn btn-sheq" id="registerBtnSubmit">
              <i class="fas fa-user-check me-2"></i> Create new account
            </button>
          </div>
          <div id="registerFeedback" class="message-box" style="display: none;"></div>
          <div class="footer-note">
            <i class="fas fa-shield-alt me-1"></i> Registration adds row to Login tab · Email must be unique.
          </div>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
  // ======================== CONFIGURATION ==========================
  // IMPORTANT: Replace with your actual Google Apps Script Web App URL (doPost/doGet)
  const SCRIPT_URL = "PASTE_YOUR_APPS_SCRIPT_WEB_APP_URL_HERE"; 
  // After deployment, copy the URL (e.g., https://script.google.com/macros/s/.../exec)
  // =================================================================

  // DOM elements
  const loginPane = document.getElementById('loginPane');
  const registerPane = document.getElementById('registerPane');
  const loginTab = document.getElementById('loginTabBtn');
  const registerTab = document.getElementById('registerTabBtn');
  const loginForm = document.getElementById('secureLoginForm');
  const registerForm = document.getElementById('secureRegisterForm');
  const loginFeedbackDiv = document.getElementById('loginFeedback');
  const registerFeedbackDiv = document.getElementById('registerFeedback');
  const statusSpan = document.getElementById('statusText');
  const statusBadgeSpan = document.getElementById('liveStatusBadge');

  let activeCheckInterval = null;

  // Helper: show message in specific container
  function showMessage(element, message, type) {
    element.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-triangle' : 'fa-info-circle'} me-2"></i> ${message}`;
    element.className = `message-box ${type === 'success' ? 'success-message' : type === 'error' ? 'error-message' : 'info-message'}`;
    element.style.display = 'block';
    setTimeout(() => {
      if (element.style.display === 'block') {
        element.style.opacity = '1';
      }
    }, 10);
    // auto hide after 5 sec for success/info but not critical, but keep it visible for errors? fine
    setTimeout(() => {
      if (element && !element.matches(':hover')) {
        element.style.opacity = '0.8';
        setTimeout(() => {
          if (element && element.style.display !== 'none') element.style.display = 'none';
        }, 800);
      }
    }, 5000);
  }

  function setStatusBadge(isConnected, message) {
    if (isConnected) {
      statusSpan.innerText = message || 'Live · SHEQ ready';
      statusBadgeSpan.innerHTML = `<i class="fas fa-circle" style="font-size:0.7rem; color:#2a9d8f;"></i> <span id="statusText">${message || 'Connected'}</span>`;
    } else {
      statusSpan.innerText = message || 'Offline · Check URL';
      statusBadgeSpan.innerHTML = `<i class="fas fa-circle" style="font-size:0.7rem; color:#d62828;"></i> <span id="statusText">${message || 'Connection error'}</span>`;
    }
  }

  // function to test connectivity and optionally load dashboard preview (lightweight)
  async function testConnection() {
    try {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 8000);
      const response = await fetch(`${SCRIPT_URL}?action=dashboard`, { method: 'GET', signal: controller.signal });
      clearTimeout(timeoutId);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const data = await response.json();
      if (data && data.connected === true) {
        setStatusBadge(true, 'Live · Google Sheets connected');
        return true;
      } else {
        throw new Error(data?.message || 'Backend returned disconnected');
      }
    } catch (err) {
      console.warn('Connection test failed:', err);
      setStatusBadge(false, 'Cannot reach Apps Script. Check URL & deployment');
      return false;
    }
  }

  // Helper POST request to Apps Script
  async function callAppsScript(action, payloadData) {
    const requestBody = { action, ...payloadData };
    try {
      const response = await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(requestBody)
      });
      if (!response.ok) throw new Error(`Server responded with ${response.status}`);
      const result = await response.json();
      return result;
    } catch (err) {
      console.error('API call error:', err);
      return { status: 'error', message: err.message || 'Network or CORS issue. Verify Apps Script deployment.' };
    }
  }

  // LOGIN handler
  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const submitBtn = document.getElementById('loginBtnSubmit');
    const originalText = submitBtn.innerHTML;
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<i class="fas fa-spinner fa-pulse me-2"></i> Authenticating...';

    const email = loginForm.querySelector('input[name="email"]').value.trim();
    const password = loginForm.querySelector('input[name="password"]').value;

    if (!email || !password) {
      showMessage(loginFeedbackDiv, 'Please provide both email and password.', 'error');
      submitBtn.disabled = false;
      submitBtn.innerHTML = originalText;
      return;
    }

    const result = await callAppsScript('loginUser', { email, password });

    if (result && result.status === 'success') {
      showMessage(loginFeedbackDiv, `Welcome ${result.user?.fullName || 'User'}! Redirecting to dashboard...`, 'success');
      // store minimal session info in sessionStorage for UI continuity
      sessionStorage.setItem('sheq_logged_user', JSON.stringify({
        fullName: result.user?.fullName,
        email: result.user?.email,
        role: result.user?.role,
        department: result.user?.department,
        loginTime: new Date().toISOString()
      }));
      // After successful login, redirect to main dashboard HTML (the original full SHEQ app)
      // We'll redirect to the full dashboard page (assuming it's hosted under same domain or we reload with param)
      // Because the requirement: "fix login to function and make login page professional" — this page serves as secure gateway.
      // Upon success, we forward to the main dashboard interface (which could be the same origin).
      // For demonstration, we create a session and redirect to the integrated dashboard URL (OnPoint_SHEQ_Dashboard_LOGIN_FIRST_ONLY).
      // Since we are in the same file, but originally there is a separate HTML dashboard; we can either embed the dashboard logic here or redirect.
      // For professionalism, we preserve user session and redirect to the full SHEQ dashboard (the one with all tabs).
      // BUT because we are inside a single HTML now, I will implement a soft redirect: replace window.location with dashboard version.
      // The user expects that after login they see the dashboard & register works. Therefore, we redirect to the provided dashboard URL
      // but we need to pass a token? The original Apps Script expects no token, just session? Actually the original script relies on the same sheet.
      // I will redirect to the full dashboard file (if hosted on same domain as this page). For standalone we can note that the dashboard html should be deployed separately.
      // To make smooth UX: Show success, then redirect to the main dashboard (absolute URL). Since we are not sure of the hosting, we will prompt to load the dashboard data inline?
      // alternatively we can display a quick "Go to dashboard" button. For professional flow, I will redirect to the dashboard using the same script URL but replace the page.
      // I'll create a redirect to the original dashboard (relative path or same file? better to keep unified: I'll embed minimal dashboard inside a modal? Not needed, just forward).
      setTimeout(() => {
        // The dashboard HTML file (OnPoint_SHEQ_Dashboard_LOGIN_FIRST_ONLY) has the full interface. To keep it pure: we forward to that html.
        // Because we are now in login.html, we assume the dashboard file is located at './dashboard.html' or the same path. For safety, we use the current origin plus '?dashboard'
        // Better: provide button that goes to dashboard; but user expects auto redirect.
        // For perfect user flow, we redirect to the main dashboard interface (which uses same backend). The separate dashboard expects login state? It has its own login section, but we pass a bypass? The safest is to redirect to a merged version. However since we are asked to fix login and make professional, we provide post-login auto-forward to original dashboard page, but login is already fixed.
        window.location.href = './OnPoint_SHEQ_Dashboard_LOGIN_FIRST_ONLY.html'; // if hosted alongside. If not, we show manual link.
      }, 1800);
    } else {
      const errMsg = result?.message || 'Invalid email, password or account inactive.';
      showMessage(loginFeedbackDiv, errMsg, 'error');
      submitBtn.disabled = false;
      submitBtn.innerHTML = originalText;
    }
  });

  // REGISTRATION handler
  registerForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const submitBtn = document.getElementById('registerBtnSubmit');
    const originalBtnHtml = submitBtn.innerHTML;
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<i class="fas fa-spinner fa-pulse me-2"></i> Registering...';

    const formData = {
      fullName: registerForm.querySelector('input[name="fullName"]').value.trim(),
      email: registerForm.querySelector('input[name="email"]').value.trim(),
      password: registerForm.querySelector('input[name="password"]').value,
      role: registerForm.querySelector('select[name="role"]').value,
      department: registerForm.querySelector('input[name="department"]').value.trim(),
      status: registerForm.querySelector('select[name="status"]').value
    };

    if (!formData.fullName || !formData.email || !formData.password) {
      showMessage(registerFeedbackDiv, 'Full name, email and password are required.', 'error');
      submitBtn.disabled = false;
      submitBtn.innerHTML = originalBtnHtml;
      return;
    }

    const result = await callAppsScript('registerUser', formData);

    if (result && result.status === 'success') {
      showMessage(registerFeedbackDiv, '✓ Registration successful! You can now login with your credentials.', 'success');
      registerForm.reset();
      // switch to login tab after short delay for smooth UX
      setTimeout(() => {
        loginTab.click();
        showMessage(loginFeedbackDiv, 'Account created! Please sign in.', 'info');
      }, 1500);
    } else {
      const errorMsg = result?.message || 'Registration failed. Email might already exist.';
      showMessage(registerFeedbackDiv, errorMsg, 'error');
    }
    submitBtn.disabled = false;
    submitBtn.innerHTML = originalBtnHtml;
  });

  // Tab switching logic
  function switchToLogin() {
    loginPane.classList.add('active-pane');
    registerPane.classList.remove('active-pane');
    loginTab.classList.add('active');
    registerTab.classList.remove('active');
    // clear messages
    loginFeedbackDiv.style.display = 'none';
    registerFeedbackDiv.style.display = 'none';
  }

  function switchToRegister() {
    registerPane.classList.add('active-pane');
    loginPane.classList.remove('active-pane');
    registerTab.classList.add('active');
    loginTab.classList.remove('active');
    loginFeedbackDiv.style.display = 'none';
    registerFeedbackDiv.style.display = 'none';
  }

  loginTab.addEventListener('click', switchToLogin);
  registerTab.addEventListener('click', switchToRegister);

  // Health check + update UI
  (async function init() {
    const isConnected = await testConnection();
    if (!isConnected) {
      showMessage(loginFeedbackDiv, '⚠️ Cannot connect to Apps Script. Verify deployment URL and ensure Web App is published (execute as me, access anyone).', 'error');
    } else {
      // subtle notification
      console.log('SHEQ backend active');
    }
    // prefill any demo or keep clean
  })();

  // extra: session note – if someone was already logged in via sessionStorage we could auto-redirect,
  // but better to keep fresh login.
  // Also handle if the user tries to go back, etc.
  // Override any accidental redirect loops? fine
  // Additional professional feature: show password strength optional not needed
  // clear feedback on input focus
  const clearLoginFeedback = () => { loginFeedbackDiv.style.display = 'none'; };
  const clearRegisterFeedback = () => { registerFeedbackDiv.style.display = 'none'; };
  loginForm.querySelectorAll('input').forEach(inp => inp.addEventListener('focus', clearLoginFeedback));
  registerForm.querySelectorAll('input, select').forEach(inp => inp.addEventListener('focus', clearRegisterFeedback));
  
  // manual reconnect button? connection status badge click test
  statusBadgeSpan.style.cursor = 'pointer';
  statusBadgeSpan.addEventListener('click', async () => {
    statusSpan.innerText = 'Reconnecting...';
    await testConnection();
  });

  // final: if SCRIPT_URL placeholder is not replaced, show warning
  if (SCRIPT_URL === "https://script.google.com/macros/s/AKfycbwpVjZy69AHU3sG7k4sLfA90ZqFfA71AnCzB1APKo6LNptzEPHlaQTEHv_9iVVcLwrRow/exec") {
    const warningDiv = document.createElement('div');
    warningDiv.className = 'alert alert-warning text-center mt-3 mx-3';
    warningDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> <strong>Action required:</strong> Please replace <code>SCRIPT_URL</code> with your actual Google Apps Script Web App URL (from Deploy > Web app).';
    document.querySelector('.auth-card').after(warningDiv);
  }
</script>
</body>
</html>
