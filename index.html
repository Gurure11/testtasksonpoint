    divisions: { action: 'divisions', saveAction: 'addDivision', sheetTab: 'divisions', displayTab: 'Divisions', columns: ['Division ID', 'Division Name', 'Head', 'Region', 'Status'] },

    return Object.values(SHEET_ROUTES).find(route => route.action === action || route.saveAction === action) || null;

  const FALLBACK_USERS = Object.keys(SYSTEM_USER_EMAILS);

  // ========== LOGIN FUNCTIONS ==========
  async function fetchUsersFromSheet() {
    try {
      const url = `${SCRIPT_URL}?action=users&sheetId=${SHEET_ID}&sheetTab=${USERS_SHEET_TAB}&_=${Date.now()}`;
      const res = await fetch(url, { method: 'GET', cache: 'no-store' });
      if (!res.ok) throw new Error('Failed to fetch users');
      const text = await res.text();
      let data = text ? JSON.parse(text) : [];
      if (data && data.data && Array.isArray(data.data)) data = data.data;
      if (!Array.isArray(data)) data = [];
      return data.filter(row => row['Email'] && row['Password']);
    } catch(e) {
      console.warn('Could not fetch users from sheet, using fallback', e);
      return [];
    }
  }

  async function validateLogin(email, password) {
    const users = await fetchUsersFromSheet();
    const matchedUser = users.find(u => 
      String(u['Email']).trim().toLowerCase() === email.trim().toLowerCase() && 
      String(u['Password']).trim() === password.trim()
    );
    if (matchedUser) {
      return {
        Email: matchedUser['Email'],
        Role: matchedUser['Role'] || 'User',
        'Full Name': matchedUser['Full Name'] || matchedUser['Name'] || email.split('@')[0],
        Department: matchedUser['Department'] || 'General'
      };
    }
    return null;
  }

  function showLoginScreen() {
    const loginHTML = `
      <div class="login-overlay" id="loginOverlay">
        <div class="login-card">
          <h2>🔐 QuickBase Login</h2>
          <p>Sign in with your credentials from the Users sheet</p>
          <input type="email" id="loginEmail" placeholder="Email address" autocomplete="off">
          <input type="password" id="loginPassword" placeholder="Password">
          <button id="loginBtn">Sign In</button>
          <div id="loginError" class="error-msg"></div>
        </div>
      </div>
    `;
    document.body.insertAdjacentHTML('beforeend', loginHTML);
    document.getElementById('loginBtn').addEventListener('click', async () => {
      const email = document.getElementById('loginEmail').value;
      const pwd = document.getElementById('loginPassword').value;
      const errorDiv = document.getElementById('loginError');
      if (!email || !pwd) {
        errorDiv.textContent = 'Please enter email and password';
        return;
      }
      errorDiv.textContent = 'Validating...';
      const user = await validateLogin(email, pwd);
      if (user) {
        currentUser = user;
        localStorage.setItem('quickbase_user', JSON.stringify(user));
        isAuthenticated = true;
        document.getElementById('loginOverlay').remove();
        loadCurrentSection();
      } else {
        errorDiv.textContent = 'Invalid email or password. Please check the Users sheet.';
      }
    });
  }

  function logout() {
    localStorage.removeItem('quickbase_user');
    currentUser = null;
    isAuthenticated = false;
    document.getElementById('appRoot').style.display = 'none';
    const existingOverlay = document.getElementById('loginOverlay');
    if (existingOverlay) existingOverlay.remove();
    showLoginScreen();
    document.getElementById('appRoot').style.display = 'flex';
  }

  function escapeHtml(str) {
    if (str === undefined || str === null) return '';
    return String(str).replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
  }

  function normalizeName(str) {
    return String(str || '').trim().replace(/\s+/g, ' ').toLowerCase();
  }

  function getCurrentUser() {
    try {
      return JSON.parse(localStorage.getItem('quickbase_user') || 'null');
    } catch(e) { return null; }
  }

  function requireLogin() {
    currentUser = getCurrentUser();
    if (!currentUser || !currentUser.Email) {

    return true;

  function showMessage(msg, type, containerId) {
    const container = document.getElementById(containerId);
    if (!container) return;
    container.textContent = msg;
    container.className = `message-bar message-${type}`;
    container.style.display = 'block';
    if (type !== 'info') setTimeout(() => { if(container) container.style.display = 'none'; }, 6000);
  }

  function setButtonLoading(buttonId, isLoading, loadingText = 'Synchronising...') {
    const btn = document.getElementById(buttonId);
    if (!btn) return;
    if (isLoading) {
      btn.dataset.originalText = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = `<span class="sync-dot"></span>${loadingText}`;
    } else {
      btn.disabled = false;
      btn.innerHTML = btn.dataset.originalText || btn.innerHTML;
    }
  }

  async function apiGet(action) {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 25000);
    try {
      const route = getRouteByAction(action);
      const sheetTabParam = route ? `&sheetTab=${encodeURIComponent(route.sheetTab)}` : '';
      const url = `${SCRIPT_URL}?action=${encodeURIComponent(action)}&sheetId=${encodeURIComponent(SHEET_ID)}${sheetTabParam}&_=${Date.now()}`;
      const res = await fetch(url, { method: 'GET', signal: controller.signal, cache: 'no-store', redirect: 'follow' });
      clearTimeout(timeout);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();
      const json = text ? JSON.parse(text) : [];
      if (Array.isArray(json)) return json;
      if (json && Array.isArray(json.data)) return json.data;
      if (json && Array.isArray(json.rows)) return json.rows;
      if (json && json.success === false) throw new Error(json.message || json.error || 'API returned an error');
      return [];
    } catch(e) {
      clearTimeout(timeout);
      console.error(`API error (${action}):`, e);
      throw e;
    }
  }

  async function apiPost(action, payload) {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 30000);
    try {
      const route = getRouteByAction(action);
      const routedPayload = route ? Object.assign({}, payload, { sheetTab: route.sheetTab, sheetName: route.sheetTab, tabName: route.sheetTab }) : payload;
      const requestBody = { action, payload: routedPayload, user: currentUser, sheetId: SHEET_ID, sheetTab: route ? route.sheetTab : (payload && payload.sheetTab), sheetName: route ? route.sheetTab : (payload && payload.sheetTab), tabName: route ? route.sheetTab : (payload && payload.sheetTab), sendEmail: SEND_EMAIL_NOTIFICATIONS };
      const fetchOptions = {
        method: 'POST',
        headers: API_POST_MODE === 'form' ? { 'Content-Type': 'application/x-www-form-urlencoded;charset=utf-8' } : { 'Content-Type': 'text/plain;charset=utf-8' },
        body: API_POST_MODE === 'form' ? new URLSearchParams({ data: JSON.stringify(requestBody) }) : JSON.stringify(requestBody),
        signal: controller.signal,
        redirect: 'follow'
      };
      const res = await fetch(SCRIPT_URL, fetchOptions);
      clearTimeout(timeout);
      const text = await res.text();
      let json = {};
      try { json = text ? JSON.parse(text) : {}; }
      catch(parseErr) { json = { success: res.ok, message: text || 'Saved, but server did not return JSON.' }; }
      if (!res.ok) throw new Error(json.message || json.error || `HTTP ${res.status}`);
      if (json && json.success === false) throw new Error(json.message || json.error || 'Save failed');
      return json;
    } catch(e) {
      clearTimeout(timeout);
      if (e.name === 'AbortError') throw new Error('Request timed out. Check the Apps Script deployment URL and access permissions.');
      throw e;
    }
  }

  async function sendEmailViaBackend(assigneeEmail, assigneeName, taskTitle, dueDate, description, taskType) {
    if (!SEND_EMAIL_NOTIFICATIONS) return { success: true, skipped: true };
    if (!assigneeEmail || assigneeEmail.trim() === '') return { success: false, error: 'No email address provided' };
    try {
      const emailPayload = {
        action: 'sendTaskEmail',
        emailTo: assigneeEmail,
        emailSubject: `${taskType} assigned: ${taskTitle}`,
        emailBody: `Hi ${assigneeName || 'Assignee'},

A ${taskType.toLowerCase()} has been assigned to you via QuickBase.

Task: ${taskTitle}
Due / Next Run: ${dueDate || 'Not specified'}
Description: ${description || 'No description provided.'}

Created by: ${currentUser?.['Full Name'] || currentUser?.Email || 'QuickBase System'}

Please log in to QuickBase to review and update this item.`,
        sheetId: SHEET_ID,
        user: currentUser
      };
      const res = await fetch(SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(emailPayload)
      });
      const text = await res.text();
      let json = {};
      try { json = JSON.parse(text); } catch(e) { json = { success: res.ok }; }
      if (!res.ok) throw new Error(json.message || `HTTP ${res.status}`);
      return { success: true, response: json };
    } catch(e) {
      console.error('Email send error:', e);
      return { success: false, error: e.message };
    }
  }

  async function saveWithSyncAndNotify(buttonId, messageId, action, payload, successMessage, options = {}) {
    setButtonLoading(buttonId, true);
    showMessage('Synchronising with Google Sheets...', 'info', messageId);
    try {
      const res = await apiPost(action, payload);
      showMessage(successMessage, 'success', messageId);
      
      if (SEND_EMAIL_NOTIFICATIONS && payload.assignedEmail && payload.assignedEmail.trim() !== '') {
        showMessage('Sending email notification to assignee via Gmail...', 'info', messageId);
        const emailResult = await sendEmailViaBackend(
          payload.assignedEmail,
          payload.assignedTo || 'Assignee',
          payload.title || payload.taskName || 'Task',
          payload.dueDate || payload.nextRun || 'Not set',
          payload.description || 'No description',
          action === 'addAutomatedTask' ? 'Automated Task' : 'Task'
        );
        if (emailResult.success) {
          showMessage(`Email sent to ${payload.assignedEmail}`, 'success', messageId);
        } else {
          showMessage(`Email failed: ${emailResult.error}`, 'error', messageId);
        }
      } else if (SEND_EMAIL_NOTIFICATIONS && (!payload.assignedEmail || payload.assignedEmail.trim() === '')) {
        showMessage('No assignee email provided. Email not sent.', 'info', messageId);
      }
      
      const wantsWhatsApp = confirm(`Task "${payload.title || payload.taskName}" created successfully!\n\nDo you want to share this task with the assignee via WhatsApp?\n\nClick OK to share on WhatsApp, Cancel to skip.`);
      if (wantsWhatsApp) {
        let phoneNumber = prompt("Enter assignee's WhatsApp phone number (with country code, e.g., +27...):\nIf you don't have the number, you can share the task link manually.", "");
        if (phoneNumber && phoneNumber.trim() !== '') {
          const taskDetails = `*New Task Assigned:* ${payload.title || payload.taskName}\n*Due Date:* ${payload.dueDate || payload.nextRun || 'Not set'}\n*Description:* ${payload.description || 'No description'}\n*Created by:* ${currentUser?.['Full Name'] || 'QuickBase'}`;
          const whatsappUrl = `https://wa.me/${phoneNumber.replace(/\D/g, '')}?text=${encodeURIComponent(taskDetails)}`;
          window.open(whatsappUrl, '_blank');
          showMessage('WhatsApp chat opened. Send the message to the assignee.', 'success', messageId);
        } else if (phoneNumber !== null) {
          showMessage('No phone number provided. WhatsApp sharing skipped.', 'info', messageId);
        }
      }
      
      alert(`${successMessage}${emailSent ? ' Email notification sent.' : ''}`);
      if (typeof options.afterSuccess === 'function') options.afterSuccess(res);
      return res;
    } catch(e) {
      const errorMessage = e.message || 'Fetch failed. Check API deployment and access.';
      showMessage(errorMessage, 'error', messageId);
      alert(`Save failed: ${errorMessage}`);
      return { success: false, message: errorMessage };
    } finally {
      setButtonLoading(buttonId, false);
    }
  }

  function findEmailForUser(name) {
    const wanted = normalizeName(name);
    if (!wanted) return '';
    const exactKey = Object.keys(SYSTEM_USER_EMAILS).find(k => normalizeName(k) === wanted);
    if (exactKey) return SYSTEM_USER_EMAILS[exactKey];
    const match = cachedPeopleRows.find(row => normalizeName(row['Full Name'] || row['Employee Name'] || row.Name || row.User) === wanted);
    return (match && (match.Email || match['Email Address'] || match.WorkEmail || match['Work Email'])) || '';
  }

    const sync = () => { email.value = findEmailForUser(select.value); };

  }

  }
